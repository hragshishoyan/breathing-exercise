  <h2 class="preview-title" id="previewTitle">--</h2>
  <p class="preview-subtitle" id="previewSubtitle">--</p>
  <div class="pick-label">What you'll do</div>
  <ul class="phase-list" id="phaseList"></ul>
  <div class="preview-actions">
    <button class="ctrl-btn primary" id="previewStartBtn" type="button">Start session</button>
    <button class="ctrl-btn back-btn" id="previewBackBtn" type="button">← Back</button>
  </div>
</section>

<section id="sessionScreen" class="screen">
  <header class="session-header">
    <div class="phase-progress" id="phaseProgress">Phase 1 of 1</div>
    <h2 class="phase-name" id="phaseName">--</h2>
    <p class="phase-instruction" id="phaseInstruction">--</p>
  </header>

  <div class="circle-wrap">
    <div class="circle-stage">
      <div class="circle-ring-outer"></div>
      <div class="circle" id="circle">
        <div class="circle-inner">
          <div class="step-label" id="stepLabel">Ready</div>
          <div class="step-count" id="stepCount">0</div>
        </div>
      </div>
    </div>
  </div>

  <footer class="session-footer">
    <div class="dual-timer">
      <div class="timer-cell">
        <div class="time-remaining-label">Exercise</div>
        <div class="time-remaining secondary" id="phaseTimeRemaining">00:00</div>
      </div>
      <div class="timer-cell">
        <div class="time-remaining-label">Total</div>
        <div class="time-remaining" id="timeRemaining">00:00</div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn primary" id="pauseBtn" type="button">Pause</button>
      <button class="ctrl-btn danger" id="stopBtn" type="button">Stop</button>
    </div>
  </footer>
</section>

<section id="doneScreen" class="screen">
  <div class="done-check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0a1410" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 12 10 18 20 6"></polyline>
    </svg>
  </div>
  <h2 class="done-title">Nice work</h2>
  <p class="done-sub">Session complete. Your lungs just got stronger.</p>
  <button class="done-btn" id="doneBtn" type="button">Back to start</button>
</section>

<script>
(function () {
  'use strict';

  const startScreen = document.getElementById('startScreen');
  const previewScreen = document.getElementById('previewScreen');
  const sessionScreen = document.getElementById('sessionScreen');
  const doneScreen = document.getElementById('doneScreen');
  const durationGrid = document.getElementById('durationGrid');
  const previewTitle = document.getElementById('previewTitle');
  const previewSubtitle = document.getElementById('previewSubtitle');
  const phaseList = document.getElementById('phaseList');
  const previewStartBtn = document.getElementById('previewStartBtn');
  const previewBackBtn = document.getElementById('previewBackBtn');
  const phaseProgress = document.getElementById('phaseProgress');
  const phaseName = document.getElementById('phaseName');
  const phaseInstruction = document.getElementById('phaseInstruction');
  const circle = document.getElementById('circle');
  const stepLabel = document.getElementById('stepLabel');
  const stepCount = document.getElementById('stepCount');
  const timeRemaining = document.getElementById('timeRemaining');
  const phaseTimeRemaining = document.getElementById('phaseTimeRemaining');
  const pauseBtn = document.getElementById('pauseBtn');
  const stopBtn = document.getElementById('stopBtn');
  const doneBtn = document.getElementById('doneBtn');

  let pendingMinutes = 0;
  let wakeLock = null;

  const MIN_SCALE = 0.55;
  const MAX_SCALE = 1.0;

  // Keep the screen on for the duration of a session.
  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (_) { /* user agent may deny; not critical */ }
  }
  function releaseWakeLock() {
    if (wakeLock) {
      wakeLock.release().catch(() => {});
      wakeLock = null;
    }
  }

  function hapticTap() {
    if (navigator.vibrate) { try { navigator.vibrate(15); } catch (_) {} }
  }
  function hapticPhase() {
    if (navigator.vibrate) { try { navigator.vibrate([30, 50, 30]); } catch (_) {} }
  }

  function showScreen(which) {
    [startScreen, previewScreen, sessionScreen, doneScreen].forEach(s => s.classList.remove('active'));
    which.classList.add('active');
  }

  function showError(msg) {
    const banner = document.createElement('div');
    banner.className = 'error-banner';
    banner.textContent = msg;
    document.body.prepend(banner);
  }

  function fmtTime(totalSeconds) {
    const s = Math.max(0, Math.ceil(totalSeconds));
    const m = Math.floor(s / 60);
    const r = s % 60;
    return (m < 10 ? '0' : '') + m + ':' + (r < 10 ? '0' : '') + r;
  }

  function buildDurationButtons() {
    if (typeof ROUTINES === 'undefined' || !ROUTINES) {
      showError('routines.js not loaded. Make sure routines.js is in the same folder.');
      return;
    }
    const keys = [5, 10, 15, 20];
    keys.forEach(min => {
      const r = ROUTINES[min];
      if (!r) return;
      const btn = document.createElement('button');
      btn.className = 'duration-btn';
      btn.type = 'button';
      btn.innerHTML =
        '<span class="num">' + min + '</span>' +
        '<span class="unit">Minutes</span>';
      btn.addEventListener('click', () => { hapticTap(); showPreview(min); });
      durationGrid.appendChild(btn);
    });
  }

  function showPreview(minutes) {
    const routine = ROUTINES[minutes];
    if (!routine) {
      showError('Routine for ' + minutes + ' minutes is missing.');
      return;
    }
    pendingMinutes = minutes;
    previewTitle.textContent = minutes + ' min — ' + routine.title;
    previewSubtitle.textContent = routine.subtitle;
    phaseList.innerHTML = '';
    routine.phases.forEach(p => {
      const li = document.createElement('li');
      const bullet = document.createElement('span');
      bullet.className = 'li-bullet';
      bullet.textContent = '•';
      const name = document.createElement('span');
      name.className = 'li-name';
      name.textContent = p.name;
      const dur = document.createElement('span');
      dur.className = 'li-duration';
      dur.textContent = fmtTime(p.duration);
      li.appendChild(bullet);
      li.appendChild(name);
      li.appendChild(dur);
      phaseList.appendChild(li);
    });
    showScreen(previewScreen);
  }

  const session = {
    active: false,
    minutes: 0,
    routine: null,
    phases: null,
    totalSeconds: 0,
    cumulative: null,
    patternCycle: null,
    startTime: 0,
    pausedAccumMs: 0,
    pausedAt: 0,
    isPaused: false,
    rafId: 0,
  };

  function buildPhaseTables(routine) {
    const phases = routine.phases;
    const cumulative = new Array(phases.length + 1);
    cumulative[0] = 0;
    for (let i = 0; i < phases.length; i++) {
      cumulative[i + 1] = cumulative[i] + phases[i].duration;
    }
    const patternCycle = phases.map(p => {
      const offsets = new Array(p.pattern.length + 1);
      offsets[0] = 0;
      for (let i = 0; i < p.pattern.length; i++) {
        offsets[i + 1] = offsets[i] + p.pattern[i].seconds;
      }
      return { sum: offsets[offsets.length - 1], offsets };
    });
    return { cumulative, patternCycle, total: cumulative[cumulative.length - 1] };
  }

  function startSession(minutes) {
    const routine = ROUTINES[minutes];
    if (!routine || !routine.phases || !routine.phases.length) {
      showError('Routine for ' + minutes + ' minutes is missing or invalid.');
      return;
    }
    const tables = buildPhaseTables(routine);
    session.active = true;
    session.minutes = minutes;
    session.routine = routine;
    session.phases = routine.phases;
    session.totalSeconds = tables.total;
    session.cumulative = tables.cumulative;
    session.patternCycle = tables.patternCycle;
    session.startTime = performance.now();
    session.pausedAccumMs = 0;
    session.pausedAt = 0;
    session.isPaused = false;
    pauseBtn.textContent = 'Pause';

    showScreen(sessionScreen);
    acquireWakeLock();
    if (session.rafId) cancelAnimationFrame(session.rafId);
    loop();
  }

  function stopSession(goDone) {
    session.active = false;
    if (session.rafId) {
      cancelAnimationFrame(session.rafId);
      session.rafId = 0;
    }
    releaseWakeLock();
    if (goDone) {
      showScreen(doneScreen);
    } else {
      showScreen(startScreen);
    }
  }

  function togglePause() {
    if (!session.active) return;
    if (session.isPaused) {
      session.pausedAccumMs += performance.now() - session.pausedAt;
      session.isPaused = false;
      session.pausedAt = 0;
      pauseBtn.textContent = 'Pause';
      loop();
    } else {
      session.isPaused = true;
      session.pausedAt = performance.now();
      pauseBtn.textContent = 'Resume';
      if (session.rafId) {
        cancelAnimationFrame(session.rafId);
        session.rafId = 0;
      }
    }
  }

  function findPhaseIndex(elapsed) {
    const c = session.cumulative;
    let lo = 0, hi = c.length - 2;
    while (lo < hi) {
      const mid = (lo + hi + 1) >> 1;
      if (c[mid] <= elapsed) lo = mid;
      else hi = mid - 1;
    }
    return lo;
  }

  function findStepIndex(offsets, t) {
    let lo = 0, hi = offsets.length - 2;
    while (lo < hi) {
      const mid = (lo + hi + 1) >> 1;
      if (offsets[mid] <= t) lo = mid;
      else hi = mid - 1;
    }
    return lo;
  }

  function easeInOut(x) {
    return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
  }

  function scaleForStep(action, stepElapsed, stepSeconds) {
    const t = Math.max(0, Math.min(1, stepElapsed / stepSeconds));
    if (action === 'inhale') {
      return MIN_SCALE + (MAX_SCALE - MIN_SCALE) * easeInOut(t);
    }
    if (action === 'exhale') {
      return MAX_SCALE - (MAX_SCALE - MIN_SCALE) * easeInOut(t);
    }
    return MAX_SCALE;
  }

  let lastPhaseIdx = -1;

  function render() {
    const now = performance.now();
    const elapsedMs = now - session.startTime - session.pausedAccumMs;
    const elapsed = elapsedMs / 1000;

    if (elapsed >= session.totalSeconds) {
      circle.style.transform = 'scale(' + MIN_SCALE + ')';
      stepLabel.textContent = 'Done';
      stepCount.textContent = '0';
      timeRemaining.textContent = '00:00';
      phaseTimeRemaining.textContent = '00:00';
      stopSession(true);
      lastPhaseIdx = -1;
      return false;
    }

    const phaseIdx = findPhaseIndex(elapsed);
    const phase = session.phases[phaseIdx];
    const phaseStart = session.cumulative[phaseIdx];
    const phaseEnd = session.cumulative[phaseIdx + 1];
    const phaseElapsed = elapsed - phaseStart;
    const cycle = session.patternCycle[phaseIdx];
    const tInCycle = phaseElapsed % cycle.sum;
    const stepIdx = findStepIndex(cycle.offsets, tInCycle);
    const step = phase.pattern[stepIdx];
    const stepStart = cycle.offsets[stepIdx];
    const stepElapsed = tInCycle - stepStart;
    const stepRemaining = step.seconds - stepElapsed;

    if (phaseIdx !== lastPhaseIdx) {
      phaseName.textContent = phase.name;
      phaseInstruction.textContent = phase.instruction;
      phaseProgress.textContent = 'Phase ' + (phaseIdx + 1) + ' of ' + session.phases.length;
      if (lastPhaseIdx !== -1) hapticPhase();
      lastPhaseIdx = phaseIdx;
    }

    stepLabel.textContent = step.label;
    stepCount.textContent = String(Math.max(1, Math.ceil(stepRemaining)));
    timeRemaining.textContent = fmtTime(session.totalSeconds - elapsed);
    phaseTimeRemaining.textContent = fmtTime(phaseEnd - elapsed);

    const scale = scaleForStep(step.action, stepElapsed, step.seconds);
    circle.style.transform = 'scale(' + scale.toFixed(4) + ')';

    return true;
  }

  function loop() {
    if (!session.active || session.isPaused) return;
    const keepGoing = render();
    if (keepGoing && session.active && !session.isPaused) {
      session.rafId = requestAnimationFrame(loop);
    }
  }

  pauseBtn.addEventListener('click', () => { hapticTap(); togglePause(); });
  stopBtn.addEventListener('click', () => {
    hapticTap();
    lastPhaseIdx = -1;
    stopSession(false);
  });
  doneBtn.addEventListener('click', () => {
    hapticTap();
    lastPhaseIdx = -1;
    showScreen(startScreen);
  });
  previewStartBtn.addEventListener('click', () => {
    hapticTap();
    if (pendingMinutes) startSession(pendingMinutes);
  });
  previewBackBtn.addEventListener('click', () => { hapticTap(); showScreen(startScreen); });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && session.active && !session.isPaused) {
      togglePause();
    } else if (!document.hidden && session.active && !session.isPaused) {
      // Wake lock is auto-released when tab is hidden; re-acquire on return.
      acquireWakeLock();
    }
  });

  buildDurationButtons();
})();
</script>

</body>
</html>
